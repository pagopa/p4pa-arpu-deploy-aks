microservice-chart:
  image:
    tag: v1.7.0@sha256:a2f2314d6e6bf3ef975edb7993f34ccd981cb399702e6d786479697eb16b39d4

  ingress:
    host: "cittadini.internal.p4pa.pagopa.it"

  resources:
    requests:
      memory: " 2048Mi"
      cpu: "1000m"
    limits:
      memory: " 2048Mi"
      cpu: "1000m"

  autoscaling:
    enable: true
    minReplica: 2
    maxReplica: 3
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization # Allowed types are 'Utilization' or 'AverageValue'
          value: "50"

  envConfig:
    ENV: "PROD"
    JAVA_TOOL_OPTIONS: >-
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=4
      -Djdk.virtualThreadScheduler.parallelism=4
      -Djdk.virtualThreadScheduler.maxPoolSize=256
      -XX:InitialRAMPercentage=75.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:ParallelGCThreads=4
      -XX:ConcGCThreads=1
      -XX:MinTLABSize=16k
      -XX:+ResizeTLAB
      -XX:+UseContainerSupport
      -XX:+ExitOnOutOfMemoryError
      -XX:+PerfDisableSharedMem
      -XX:+AlwaysPreTouch
      -XX:+UseTransparentHugePages
      -XX:NativeMemoryTracking=detail
      -Djdk.nio.maxCachedBufferSize=262144
      -Djava.security.egd=file:/dev/./urandom
      -Dspring.profiles.active=prod
      -Djava.rmi.server.hostname=127.0.0.1 
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json

    AUTH_CLIENT_REDIRECT_URI: "https://p4pa.pagopa.it/cittadini/auth-callback"
    AUTH_ISSUER_URI: "https://oneid.pagopa.it"
    AUTH_CLIENT_AUTHORIZATION_URI: "https://oneid.pagopa.it/login"
    AUTH_CLIENT_TOKEN_URI: "https://oneid.pagopa.it/oidc/token"
    AUTH_CLIENT_JWK_URI: "https://oneid.pagopa.it/oidc/keys"

    GOOGLE_RECAPTCHA_ENABLED: "true"

  keyvault:
    name: "p4pa-p-itn-cittadini-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
