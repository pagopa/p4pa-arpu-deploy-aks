microservice-chart:
  image:
    tag: v1.6.0@sha256:e06ee49311779d006d377a87e29f9065708d2f7e8fd0f3401508375456f09d74

  ingress:
    host: "cittadini.internal.p4pa.pagopa.it"

  resources:
    requests:
      memory: " 2048Mi"
      cpu: "1000m"
    limits:
      memory: " 2048Mi"
      cpu: "1000m"

  autoscaling:
    enable: true
    minReplica: 2
    maxReplica: 3
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization # Allowed types are 'Utilization' or 'AverageValue'
          value: "50"

  envConfig:
    ENV: "PROD"
    JAVA_TOOL_OPTIONS: "-Xms1024m -Xmx1024m -Djava.util.concurrent.ForkJoinPool.common.parallelism=7 -javaagent:/app/applicationinsights-agent.jar -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json -agentlib:jdwp=transport=dt_socket,server=y,address=8001,suspend=n -Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.port=3002 -Dcom.sun.management.jmxremote.rmi.port=3003 -Djava.rmi.server.hostname=127.0.0.1 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false"

    AUTH_CLIENT_REDIRECT_URI: "https://p4pa.pagopa.it/cittadini/auth-callback"
    AUTH_ISSUER_URI: "https://oneid.pagopa.it"
    AUTH_CLIENT_AUTHORIZATION_URI: "https://oneid.pagopa.it/login"
    AUTH_CLIENT_TOKEN_URI: "https://oneid.pagopa.it/oidc/token"
    AUTH_CLIENT_JWK_URI: "https://oneid.pagopa.it/oidc/keys"

    GOOGLE_RECAPTCHA_ENABLED: "true"

  keyvault:
    name: "p4pa-p-itn-cittadini-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
