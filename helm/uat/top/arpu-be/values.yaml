microservice-chart:
  image:
    tag: uat-latest

  ingress:
    host: "cittadini.internal.uat.p4pa.pagopa.it"

  resources:
    requests:
      memory: "2048Mi"
      cpu: "1000m"
    limits:
      memory: "2048Mi"
      cpu: "1000m"

  autoscaling:
    enable: false
  #    minReplica: 1
  #    maxReplica: 1
  #    pollingInterval: 30 # seconds
  #    cooldownPeriod: 300 # seconds
  #    triggers:
  #      - type: cpu
  #        metadata:
  #          type: Utilization # Allowed types are 'Utilization' or 'AverageValue'
  #          value: "70"

  envConfig:
    ENV: "UAT"
    JAVA_TOOL_OPTIONS: >-
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=4
      -Djdk.virtualThreadScheduler.parallelism=4
      -Djdk.virtualThreadScheduler.maxPoolSize=256
      -XX:InitialRAMPercentage=60.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:ParallelGCThreads=4
      -XX:ConcGCThreads=1
      -XX:MinTLABSize=16k
      -XX:+ResizeTLAB
      -XX:+UseContainerSupport
      -XX:+PerfDisableSharedMem
      -XX:+AlwaysPreTouch
      -XX:+UseTransparentHugePages
      -XX:NativeMemoryTracking=detail
      -Djdk.nio.maxCachedBufferSize=262144
      -XX:+ShowCodeDetailsInExceptionMessages
      -XX:+EnableDynamicAgentLoading
      -Dspring.profiles.active=dev
      -agentlib:jdwp=transport=dt_socket,server=y,address=*:8001,suspend=n
      -Dcom.sun.management.jmxremote
      -Dcom.sun.management.jmxremote.port=3002
      -Dcom.sun.management.jmxremote.rmi.port=3003
      -Dcom.sun.management.jmxremote.authenticate=false
      -Dcom.sun.management.jmxremote.ssl=false
      -Dcom.sun.management.jmxremote.local.only=false
      -Djava.rmi.server.hostname=127.0.0.1 
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json

    AUTH_CLIENT_REDIRECT_URI: "https://uat.p4pa.pagopa.it/cittadini/auth-callback"
    AUTH_ISSUER_URI: "https://uat.oneid.pagopa.it"
    AUTH_CLIENT_AUTHORIZATION_URI: "https://uat.oneid.pagopa.it/login"
    AUTH_CLIENT_TOKEN_URI: "https://uat.oneid.pagopa.it/oidc/token"
    AUTH_CLIENT_JWK_URI: "https://uat.oneid.pagopa.it/oidc/keys"

    GOOGLE_RECAPTCHA_ENABLED: "false"

  keyvault:
    name: "p4pa-u-itn-cittadini-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"

postman-test:
  run: true
  repoName: arpu-be
  dir: postman
  collectionName: "pagopa-arc-E2E.postman_collection.json"
  envVariablesFile: "arc_UAT.postman_environment.json" #inside azdo secure files
